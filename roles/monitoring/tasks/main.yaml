---
- name: Create monitoring directory
  ansible.builtin.file:
    path: /opt/monitoring
    state: directory
    owner: marc
    group: marc
    mode: "0755"

- name: Create monitoring data directory
  ansible.builtin.file:
    path: /opt/monitoring/data
    state: directory
    owner: marc
    group: marc
    mode: "0755"

- name: Install monitoring systemd services
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - monitoring-data-http.service
    - log_cpu_temperature.service
    - log_cpu_usage.service
    - log_disk_usage.service
    - log_network_usage.service
    - log_ram_usage.service
    - log_srv_disk_usage.service
    - log_srv_disk_usage.timer
    - log_srv-msata_disk_usage.service
    - log_srv-msata_disk_usage.timer
  notify:
    - Reload systemd
    - Restart monitoring

- name: Copy monitoring scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /opt/monitoring/
    owner: marc
    group: marc
    mode: "0755"
  loop:
    - log_cpu_temperature.sh
    - log_cpu_usage.sh
    - log_disk_usage.sh
    - log_network_usage.sh
    - log_ram_usage.sh
    - log_srv_disk_usage.sh
    - log_srv-msata_disk_usage.sh

- name: Enable and start monitoring service
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - monitoring-data-http
    - log_cpu_temperature
    - log_cpu_usage
    - log_disk_usage
    - log_network_usage
    - log_ram_usage
    - log_srv_disk_usage
    - log_srv-msata_disk_usage
