---
- name: Install system dependencies
  ansible.builtin.apt:
    name: python3-virtualenv
    state: present

- name: Create /opt/notifier directory
  ansible.builtin.file:
    path: /opt/notifier
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy script and requirements
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /opt/notifier/{{ item }}
    owner: root
    group: root
    mode: '0644'
  loop:
    - notifier.py
    - requirements.txt

- name: Deploy encrypted .env file
  ansible.builtin.template:
    src: notifier.env.j2
    dest: /opt/notifier/notifier.env
    owner: root
    group: root
    mode: '0600'

- name: Install dependencies in venv
  ansible.builtin.pip:
    requirements: /opt/notifier/requirements.txt
    virtualenv: /opt/notifier/venv
    virtualenv_python: python3

- name: Copy systemd service templates
  ansible.builtin.template:
    src: systemd.service.j2
    dest: /etc/systemd/system/notifier-{{ item }}@.service
    owner: root
    group: root
    mode: '0644'
  loop:
    - failure
    - start
    - stop

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
