---
- name: Create homepage directory
  ansible.builtin.file:
    path: /var/www/homepage
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy homepage files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /var/www/homepage/
    owner: root
    group: root
    mode: "0644"
  loop:
    - favicon.svg
    - index.html

- name: Copy homepage icons
  ansible.builtin.copy:
    src: icons/
    dest: /var/www/homepage/icons/
    owner: root
    group: root
    mode: "0644"
